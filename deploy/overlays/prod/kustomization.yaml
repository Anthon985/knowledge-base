apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: patches/prod-resources.yaml
images:
  - name: kb-frontend
    newName: ghcr.io/your-org/kb-frontend
    newTag: latest
  - name: kb-api-server
    newName: ghcr.io/your-org/kb-api-server
    newTag: latest
  - name: kb-doc-processor
    newName: ghcr.io/your-org/kb-doc-processor
    newTag: latest