apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knowledge-base-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: knowledge-base
spec:
  project: knowledge-base
  source:
    repoURL: https://github.com/your-org/knowledge-base.git
    targetRevision: HEAD
    path: deploy/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true