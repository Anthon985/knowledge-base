apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kb-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: knowledge-base
    tier: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: knowledge-base
  source:
    repoURL: https://github.com/your-org/knowledge-base.git
    targetRevision: HEAD
    path: deploy/overlays/dev
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: knowledge-base
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m