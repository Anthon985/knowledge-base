apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: minio-events
  namespace: argo
spec:
  minio:
    document-upload:
      bucket:
        name: documents
      endpoint: minio.knowledge-base:9000
      insecure: true
      accessKey:
        name: minio-credentials
        key: accesskey
      secretKey:
        name: minio-credentials
        key: secretkey
      events:
        - s3:ObjectCreated:Put
        - s3:ObjectCreated:CompleteMultipartUpload